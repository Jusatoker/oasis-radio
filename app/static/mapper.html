<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream Deck Mapper — Oasis Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060608;
      --surface: rgba(14,14,18,0.85);
      --surface-solid: #0e0e12;
      --surface2: rgba(22,22,28,0.9);
      --surface3: #1c1c24;
      --orange: #e8420a;
      --orange-glow: rgba(232,66,10,0.35);
      --orange-dim: rgba(232,66,10,0.12);
      --text: #f0ede8;
      --text-muted: #6b6b78;
      --text-dim: #44444f;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --radius: 12px;
      --radius-lg: 16px;
      --glass: blur(20px) saturate(1.4);
      --deck-bg: #181820;
      --deck-body: #1e1e28;
      --deck-edge: #0a0a0e;
      --key-bg: #08080c;
      --key-border: rgba(255,255,255,0.08);
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,66,10,0.03) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(42,42,212,0.02) 0%, transparent 50%);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 3px;
      color: var(--orange);
      text-shadow: 0 0 30px var(--orange-glow);
    }
    .logo span { color: var(--text); text-shadow: none; }
    .logo-sep { color: var(--text-dim); margin: 0 6px; }
    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 1.5px;
      color: var(--text-muted);
    }
    .spacer { flex: 1; }
    .header-btns { display: flex; gap: 8px; }
    .btn-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .btn-pill:hover {
      border-color: var(--orange);
      color: var(--text);
      background: var(--orange-dim);
    }
    .btn-save {
      background: linear-gradient(135deg, var(--orange), #c23508);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 16px rgba(232,66,10,0.2);
    }
    .btn-save:hover {
      background: linear-gradient(135deg, #c23508, #a02a06);
      box-shadow: 0 6px 24px rgba(232,66,10,0.3);
      color: #fff;
      border-color: transparent;
    }

    /* ── Layout ── */
    .layout {
      flex: 1;
      display: flex;
      gap: 0;
      overflow: hidden;
      height: calc(100vh - 60px);
    }

    /* ── Station panel ── */
    .station-panel {
      width: 260px;
      flex-shrink: 0;
      background: var(--surface-solid);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-header h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .station-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.06) transparent;
    }

    .station-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid transparent;
      cursor: grab;
      transition: all 0.2s ease;
      margin-bottom: 2px;
      user-select: none;
    }
    .station-item:hover {
      background: rgba(255,255,255,0.03);
      border-color: var(--border);
    }
    .station-item:active { cursor: grabbing; }

    .station-item-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 6px currentColor;
    }

    .station-item-info { min-width: 0; flex: 1; }
    .station-item-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .station-item-genre {
      font-size: 11px;
      color: var(--text-dim);
    }

    .drag-hint {
      font-size: 11px;
      color: var(--text-dim);
      text-align: center;
      padding: 14px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Deck area ── */
    .deck-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      overflow: auto;
    }

    /* ── Stream Deck+ photorealistic body ── */
    .streamdeck-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .streamdeck-body {
      background: linear-gradient(160deg, var(--deck-body) 0%, var(--deck-bg) 60%, var(--deck-edge) 100%);
      border-radius: 24px;
      padding: 30px 26px 24px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03),
        0 4px 12px rgba(0,0,0,0.5),
        0 20px 60px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.04);
      position: relative;
      width: 560px;
    }

    .deck-brand {
      text-align: center;
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.1);
      margin-bottom: 20px;
      font-weight: 600;
    }

    /* Key grid (4x2) */
    .deck-keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .deck-key {
      aspect-ratio: 1;
      background: var(--key-bg);
      border-radius: 10px;
      border: 1.5px solid var(--key-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: all 0.25s ease;
      overflow: hidden;
      box-shadow: inset 0 -2px 6px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.02);
      min-height: 90px;
    }
    .deck-key.drag-over {
      border-color: var(--orange);
      background: rgba(232,66,10,0.08);
      box-shadow: inset 0 -2px 6px rgba(0,0,0,0.5), 0 0 20px rgba(232,66,10,0.1);
    }
    .deck-key.has-station {
      border-color: rgba(255,255,255,0.08);
    }
    .deck-key.has-station:hover {
      border-color: var(--orange);
      box-shadow: inset 0 -2px 6px rgba(0,0,0,0.5), 0 0 16px rgba(232,66,10,0.1);
    }

    .key-number {
      position: absolute;
      top: 5px;
      left: 7px;
      font-size: 9px;
      color: rgba(255,255,255,0.1);
      font-weight: 600;
    }

    .key-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 8px;
      text-align: center;
    }

    .key-color-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 8px currentColor;
    }

    .key-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 0.5px;
      line-height: 1.1;
      color: var(--text);
      text-align: center;
    }

    .key-genre {
      font-size: 9px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .key-empty-icon {
      color: rgba(255,255,255,0.06);
      font-size: 22px;
      line-height: 1;
    }

    .key-clear {
      position: absolute;
      top: 4px;
      right: 5px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(224,64,64,0.7);
      color: #fff;
      font-size: 10px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      line-height: 1;
      transition: background 0.2s;
    }
    .key-clear:hover { background: rgba(224,64,64,0.9); }
    .deck-key.has-station:hover .key-clear { display: flex; }

    /* Touch strip */
    .deck-touch-strip {
      background: linear-gradient(90deg, #0a0a0e, #121218, #0a0a0e);
      border-radius: 8px;
      height: 30px;
      margin-bottom: 14px;
      border: 1px solid rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.6);
    }
    .touch-strip-label {
      font-size: 10px;
      color: rgba(255,255,255,0.15);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .touch-strip-bar {
      flex: 1;
      height: 3px;
      background: linear-gradient(90deg, var(--orange), transparent);
      border-radius: 2px;
      opacity: 0.25;
    }

    /* Dials */
    .deck-dials {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .deck-dial-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .deck-dial {
      width: 100%;
      aspect-ratio: 1;
      background: radial-gradient(circle at 38% 32%, #2a2a34, #10101a);
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: all 0.25s ease;
      box-shadow:
        0 3px 10px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.05);
      min-height: 70px;
    }
    .deck-dial::after {
      content: '';
      position: absolute;
      top: 8px;
      right: 10px;
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }

    .deck-dial.drag-over {
      border-color: var(--orange);
      background: radial-gradient(circle at 38% 32%, rgba(232,66,10,0.15), #10101a);
      box-shadow: 0 3px 10px rgba(0,0,0,0.6), 0 0 20px rgba(232,66,10,0.1);
    }

    .dial-icon { font-size: 18px; line-height: 1; }
    .dial-label {
      font-size: 9px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 3px;
      text-align: center;
    }

    .deck-dial-wrap > .dial-slot-label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }

    /* ── Right panel ── */
    .control-panel {
      width: 200px;
      flex-shrink: 0;
      background: var(--surface-solid);
      border-left: 1px solid var(--border);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    .control-panel h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .control-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      cursor: grab;
      transition: all 0.2s ease;
      user-select: none;
    }
    .control-item:hover {
      border-color: var(--orange);
      background: var(--orange-dim);
    }
    .control-icon { font-size: 18px; width: 24px; text-align: center; }
    .control-name { font-size: 13px; font-weight: 500; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      opacity: 0;
      transform: translateY(8px) scale(0.96);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 300;
      pointer-events: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .toast.show { opacity: 1; transform: translateY(0) scale(1); }
    .toast.success { border-color: var(--orange); box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px rgba(232,66,10,0.1); }

    @media (max-width: 900px) {
      .station-panel { width: 180px; }
      .streamdeck-body { width: 100%; max-width: 480px; }
      .control-panel { display: none; }
    }
    @media (max-width: 640px) {
      .station-panel { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Oasis<span> Radio</span></div>
  <div class="logo-sep">/</div>
  <div class="page-title">Stream Deck Mapper</div>
  <div class="spacer"></div>
  <div class="header-btns">
    <a class="btn-pill" href="/">&larr; Dashboard</a>
    <button class="btn-pill btn-save" id="saveBtn">Save Layout</button>
  </div>
</header>

<div class="layout">
  <!-- Station list -->
  <div class="station-panel">
    <div class="panel-header">
      <h3>Stations</h3>
    </div>
    <div class="station-list" id="stationList"></div>
    <div class="drag-hint">Drag stations onto keys</div>
  </div>

  <!-- Deck -->
  <div class="deck-area">
    <div class="streamdeck-wrap">
      <div class="streamdeck-body">
        <div class="deck-brand">Stream Deck+</div>

        <!-- 8 LCD keys (4x2) -->
        <div class="deck-keys" id="deckKeys"></div>

        <!-- Touch strip -->
        <div class="deck-touch-strip">
          <span class="touch-strip-label">Now Playing</span>
          <div class="touch-strip-bar"></div>
          <span class="touch-strip-label">Vol</span>
        </div>

        <!-- 4 dials -->
        <div class="deck-dials" id="deckDials"></div>
      </div>
    </div>
  </div>

  <!-- Controls panel -->
  <div class="control-panel">
    <div>
      <h3>Controls</h3>
      <div style="display:flex;flex-direction:column;gap:6px">
        <div class="control-item" draggable="true" data-type="volume">
          <span class="control-icon">🔊</span>
          <span class="control-name">Volume</span>
        </div>
        <div class="control-item" draggable="true" data-type="mute">
          <span class="control-icon">🔇</span>
          <span class="control-name">Mute</span>
        </div>
        <div class="control-item" draggable="true" data-type="stop">
          <span class="control-icon">⏹</span>
          <span class="control-name">Stop</span>
        </div>
        <div class="control-item" draggable="true" data-type="page">
          <span class="control-icon">📄</span>
          <span class="control-name">Page Flip</span>
        </div>
        <div class="control-item" draggable="true" data-type="empty">
          <span class="control-icon">⬜</span>
          <span class="control-name">Empty</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──
let stations = [];
let layout = { keys: {}, dials: {} };
let dragData = null;

const DIAL_META = {
  volume: { icon: '🔊', label: 'Volume' },
  mute:   { icon: '🔇', label: 'Mute' },
  stop:   { icon: '⏹', label: 'Stop' },
  page:   { icon: '📄', label: 'Page' },
  empty:  { icon: '·', label: 'Empty' },
};

// ── Toast ──
function showToast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (ok ? ' success' : '');
  setTimeout(() => { t.className = 'toast'; }, 2200);
}

// ── API ──
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  return r.json();
}

// ── Render station list ──
function renderStationList() {
  const list = document.getElementById('stationList');
  list.innerHTML = '';
  stations.forEach(s => {
    const item = document.createElement('div');
    item.className = 'station-item';
    item.draggable = true;
    const dot = document.createElement('div');
    dot.className = 'station-item-dot';
    dot.style.background = s.color || '#555';
    dot.style.color = s.color || '#555';
    const info = document.createElement('div');
    info.className = 'station-item-info';
    const nameDiv = document.createElement('div');
    nameDiv.className = 'station-item-name';
    nameDiv.textContent = s.name;
    const genreDiv = document.createElement('div');
    genreDiv.className = 'station-item-genre';
    genreDiv.textContent = s.genre || '';
    info.appendChild(nameDiv);
    info.appendChild(genreDiv);
    item.appendChild(dot);
    item.appendChild(info);
    item.addEventListener('dragstart', e => {
      dragData = { source: 'station', id: s.id };
      e.dataTransfer.effectAllowed = 'copy';
    });
    list.appendChild(item);
  });
}

// ── Render deck keys ──
function renderKeys() {
  const grid = document.getElementById('deckKeys');
  grid.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const slot = layout.keys[String(i)];
    const station = slot?.type === 'station'
      ? stations.find(s => s.id === slot.id)
      : null;

    const key = document.createElement('div');
    key.className = 'deck-key' + (station ? ' has-station' : '');
    key.dataset.slot = i;

    key.innerHTML = `<span class="key-number">${i + 1}</span>`;

    if (station) {
      const content = document.createElement('div');
      content.className = 'key-content';
      const colorDot = document.createElement('div');
      colorDot.className = 'key-color-dot';
      colorDot.style.background = station.color || '#555';
      colorDot.style.color = station.color || '#555';
      const keyName = document.createElement('div');
      keyName.className = 'key-name';
      keyName.textContent = station.name;
      const keyGenre = document.createElement('div');
      keyGenre.className = 'key-genre';
      keyGenre.textContent = station.genre || '';
      content.appendChild(colorDot);
      content.appendChild(keyName);
      content.appendChild(keyGenre);
      key.appendChild(content);
      const clearBtn = document.createElement('div');
      clearBtn.className = 'key-clear';
      clearBtn.dataset.key = i;
      clearBtn.title = 'Clear';
      clearBtn.textContent = '✕';
      key.appendChild(clearBtn);
    } else {
      key.innerHTML += `<div class="key-empty-icon">+</div>`;
    }

    // Drag events
    key.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
      key.classList.add('drag-over');
    });
    key.addEventListener('dragleave', () => key.classList.remove('drag-over'));
    key.addEventListener('drop', e => {
      e.preventDefault();
      key.classList.remove('drag-over');
      if (!dragData) return;
      if (dragData.source === 'station') {
        layout.keys[String(i)] = { type: 'station', id: dragData.id };
      } else if (dragData.source === 'key') {
        const srcSlot = dragData.slot;
        const tmp = layout.keys[String(i)];
        layout.keys[String(i)] = layout.keys[String(srcSlot)] || { type: 'empty' };
        layout.keys[String(srcSlot)] = tmp || { type: 'empty' };
      }
      dragData = null;
      renderKeys();
    });

    // Drag from key
    if (station) {
      key.draggable = true;
      key.addEventListener('dragstart', e => {
        dragData = { source: 'key', slot: i };
        e.dataTransfer.effectAllowed = 'move';
      });
    }

    grid.appendChild(key);
  }

  // Clear buttons
  grid.querySelectorAll('.key-clear').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const idx = btn.dataset.key;
      delete layout.keys[idx];
      renderKeys();
    });
  });
}

// ── Render dials ──
function renderDials() {
  const grid = document.getElementById('deckDials');
  grid.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const slot = layout.dials[String(i)] || { type: 'empty' };
    const meta = DIAL_META[slot.type] || DIAL_META.empty;

    const wrap = document.createElement('div');
    wrap.className = 'deck-dial-wrap';

    const dial = document.createElement('div');
    dial.className = 'deck-dial';
    dial.dataset.dial = i;
    dial.innerHTML = `
      <span class="dial-icon">${meta.icon}</span>
      <span class="dial-label">${meta.label}</span>
    `;

    dial.addEventListener('dragover', e => {
      e.preventDefault();
      dial.classList.add('drag-over');
    });
    dial.addEventListener('dragleave', () => dial.classList.remove('drag-over'));
    dial.addEventListener('drop', e => {
      e.preventDefault();
      dial.classList.remove('drag-over');
      if (!dragData) return;
      if (dragData.source === 'control') {
        layout.dials[String(i)] = { type: dragData.type };
        dragData = null;
        renderDials();
      }
    });

    const label = document.createElement('div');
    label.className = 'dial-slot-label';
    label.textContent = `Dial ${i + 1}`;

    wrap.appendChild(dial);
    wrap.appendChild(label);
    grid.appendChild(wrap);
  }
}

// ── Control items drag ──
document.querySelectorAll('.control-item').forEach(item => {
  item.addEventListener('dragstart', e => {
    dragData = { source: 'control', type: item.dataset.type };
    e.dataTransfer.effectAllowed = 'copy';
  });
});

// ── Save ──
document.getElementById('saveBtn').addEventListener('click', async () => {
  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Saving…';
  try {
    await api('POST', '/layout', layout);
    showToast('Layout saved!');
  } catch(e) {
    showToast('Save failed', false);
  } finally {
    btn.textContent = 'Save Layout';
  }
});

// ── Init ──
async function init() {
  try {
    [stations, layout] = await Promise.all([
      api('GET', '/stations'),
      api('GET', '/layout'),
    ]);
    if (!layout.keys) layout.keys = {};
    if (!layout.dials) layout.dials = {};
  } catch(e) {
    showToast('Could not load data', false);
  }
  renderStationList();
  renderKeys();
  renderDials();
}

init();
</script>
</body>
</html>
