<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oasis Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #1a1a1a;
      --surface3: #222222;
      --orange: #e8420a;
      --orange-dim: rgba(232,66,10,0.18);
      --sxm-blue: #1a1a8c;
      --sxm-blue-dim: rgba(26,26,140,0.18);
      --text: #f0ede8;
      --text-muted: #777;
      --border: #282828;
      --radius: 10px;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 58px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 2px;
      color: var(--orange);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .logo span { color: var(--text); }

    .now-playing-ticker {
      flex: 1;
      overflow: hidden;
      height: 28px;
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .ticker-inner {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-muted);
      font-size: 13px;
    }

    .ticker-inner.active {
      color: var(--orange);
      animation: ticker-scroll 18s linear infinite;
    }

    @keyframes ticker-scroll {
      0%   { transform: translateX(0); }
      40%  { transform: translateX(0); }
      60%  { transform: translateX(calc(-100% + 300px)); }
      100% { transform: translateX(0); }
    }

    .eq-mini {
      display: none;
      gap: 2px;
      align-items: flex-end;
      height: 16px;
      flex-shrink: 0;
    }
    .eq-mini.active { display: flex; }
    .eq-mini span {
      width: 3px;
      background: var(--orange);
      border-radius: 2px;
      animation: eqb 0.7s ease-in-out infinite alternate;
    }
    .eq-mini span:nth-child(2) { animation-delay: 0.15s; }
    .eq-mini span:nth-child(3) { animation-delay: 0.3s; }
    .eq-mini span:nth-child(4) { animation-delay: 0.1s; }

    @keyframes eqb {
      from { height: 3px; }
      to   { height: 14px; }
    }

    .header-btns {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-pill:hover { border-color: var(--orange); color: var(--text); }
    .btn-pill svg { width: 14px; height: 14px; }

    /* ── City Tabs ── */
    .city-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .city-bar::-webkit-scrollbar { display: none; }

    .city-tab {
      padding: 10px 16px;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
      user-select: none;
    }
    .city-tab:hover { color: var(--text); }
    .city-tab.active {
      color: var(--orange);
      border-bottom-color: var(--orange);
    }

    .city-tab-add {
      padding: 10px 12px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: color 0.2s;
    }
    .city-tab-add:hover { color: var(--orange); }

    /* ── Main content ── */
    main {
      flex: 1;
      padding: 24px 20px;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Station grid ── */
    .station-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 40px;
    }

    .station-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      border-left: 4px solid var(--card-color, #555);
      user-select: none;
    }
    .station-card:hover {
      border-color: var(--card-color, #e8420a);
      transform: translateY(-2px);
    }
    .station-card.playing {
      background: var(--orange-dim);
      border-color: var(--orange);
      border-left-color: var(--orange);
      box-shadow: 0 0 20px rgba(232,66,10,0.25);
    }
    .station-card.dragging {
      opacity: 0.4;
    }
    .station-card.drag-over {
      border-color: var(--orange);
      background: var(--surface2);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .card-top-left {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .genre-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .station-card.playing .genre-badge {
      background: rgba(232,66,10,0.2);
      color: var(--orange);
    }

    .sxm-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #fff;
      background: var(--sxm-blue);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .eq-bars {
      display: none;
      gap: 2px;
      align-items: flex-end;
      height: 18px;
    }
    .station-card.playing .eq-bars { display: flex; }
    .eq-bars span {
      width: 3px;
      background: var(--orange);
      border-radius: 2px;
      animation: eqb 0.7s ease-in-out infinite alternate;
    }
    .eq-bars span:nth-child(2) { animation-delay: 0.2s; }
    .eq-bars span:nth-child(3) { animation-delay: 0.4s; }
    .eq-bars span:nth-child(4) { animation-delay: 0.1s; }
    .eq-bars span:nth-child(5) { animation-delay: 0.35s; }

    .card-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .card-slogan {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 14px;
      min-height: 16px;
    }

    .card-footer {
      display: flex;
      justify-content: flex-end;
    }

    .play-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: var(--surface3);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
      flex-shrink: 0;
    }
    .play-btn:hover { background: var(--orange); transform: scale(1.1); }
    .station-card.playing .play-btn { background: var(--orange); }
    .play-btn svg { width: 14px; height: 14px; }

    /* ── Search section ── */
    .search-section { margin-bottom: 30px; }

    .search-section h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* ── Search source tabs ── */
    .search-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .search-tab-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      white-space: nowrap;
    }
    .search-tab-btn:hover { border-color: var(--orange); color: var(--text); }
    .search-tab-btn.active {
      border-color: var(--orange);
      background: var(--orange-dim);
      color: var(--orange);
    }
    .search-tab-btn.sxm-tab.active {
      border-color: var(--sxm-blue);
      background: var(--sxm-blue-dim);
      color: #6699ff;
    }

    /* ── Search panes ── */
    .search-pane { display: none; }
    .search-pane.active { display: block; }

    .search-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 180px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--orange); }
    .search-input::placeholder { color: var(--text-muted); }

    .search-btn {
      padding: 9px 18px;
      background: var(--orange);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .search-btn:hover { background: #c23508; }
    .search-btn:disabled { background: var(--surface3); color: var(--text-muted); cursor: default; }

    .search-results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .result-card.sxm-card {
      border-left: 3px solid var(--sxm-blue);
    }

    .result-info { min-width: 0; flex: 1; }
    .result-name {
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .add-btn {
      padding: 5px 12px;
      background: transparent;
      border: 1px solid var(--orange);
      border-radius: 6px;
      color: var(--orange);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s;
    }
    .add-btn:hover { background: var(--orange); color: #fff; }
    .add-btn:disabled { border-color: var(--text-muted); color: var(--text-muted); cursor: default; }

    /* ── SiriusXM pane ── */
    .sxm-login-card {
      background: var(--surface);
      border: 1px solid var(--sxm-blue);
      border-radius: 14px;
      padding: 28px 24px;
      max-width: 360px;
    }

    .sxm-login-card h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1.5px;
      color: #6699ff;
      margin-bottom: 6px;
    }

    .sxm-login-card p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 18px;
    }

    .sxm-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .sxm-input:focus { border-color: var(--sxm-blue); }
    .sxm-input::placeholder { color: var(--text-muted); }

    .sxm-login-btn {
      width: 100%;
      padding: 10px 0;
      background: var(--sxm-blue);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .sxm-login-btn:hover { background: #2828b8; }
    .sxm-login-btn:disabled { opacity: 0.5; cursor: default; }

    .sxm-error {
      color: #c0392b;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }
    .sxm-error.show { display: block; }

    .sxm-logged-in-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .sxm-user-info {
      font-size: 13px;
      color: var(--text-muted);
    }
    .sxm-user-info strong {
      color: #6699ff;
    }

    .sxm-logout-btn {
      padding: 6px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .sxm-logout-btn:hover { border-color: #c0392b; color: #c0392b; }

    /* ── Spinner ── */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Volume bar (fixed bottom) ── */
    .volume-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      z-index: 200;
    }

    .vol-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 1px;
      color: var(--text-muted);
      width: 56px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .vol-icon {
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .vol-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
    }
    .vol-btn:hover { border-color: var(--orange); background: var(--orange-dim); }

    .vol-slider-wrap {
      flex: 1;
      position: relative;
      height: 4px;
      max-width: 400px;
    }

    input[type=range].vol-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, var(--orange) 0%, var(--orange) var(--vol-pct), var(--surface3) var(--vol-pct), var(--surface3) 100%);
      outline: none;
      cursor: pointer;
    }
    input[type=range].vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--orange);
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type=range].vol-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }

    .vol-number {
      width: 38px;
      text-align: right;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .vol-stop-btn {
      padding: 6px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s;
    }
    .vol-stop-btn:hover { border-color: #c0392b; color: #c0392b; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px 24px;
      width: 360px;
      max-width: 90vw;
    }
    .modal h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }
    .modal input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      margin-bottom: 14px;
    }
    .modal input:focus { border-color: var(--orange); }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btns button {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .modal-cancel { background: var(--surface2); color: var(--text-muted); }
    .modal-save { background: var(--orange); color: #fff; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
      z-index: 300;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: var(--orange); }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 8px 0 28px;
    }
    .page-btn {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.2s, background 0.2s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--orange); background: var(--orange-dim); }
    .page-btn:disabled { opacity: 0.3; cursor: default; }
    .page-indicator { font-size: 13px; color: var(--text-muted); min-width: 80px; text-align: center; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state p { font-size: 15px; margin-top: 8px; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .logo { font-size: 20px; }
      .header-btns .btn-pill span { display: none; }
      .vol-label { display: none; }
      main { padding: 16px 12px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">Oasis<span> Radio</span></div>

  <div class="now-playing-ticker">
    <div class="eq-mini" id="eqMini">
      <span style="height:8px"></span>
      <span style="height:12px"></span>
      <span style="height:5px"></span>
      <span style="height:10px"></span>
    </div>
    <div class="ticker-inner" id="tickerText">Nothing playing</div>
  </div>

  <div class="header-btns">
    <a class="btn-pill" href="/mapper.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>Deck</span>
    </a>
    <a class="btn-pill" href="http://192.168.2.89:32500" target="_blank">

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──
let stations = [];
let cities = [];
let currentStationId = null;
let volume = 80;
let activeCity = 'All';
let dragSrcIndex = null;
let volDebounce = null;
let activeSearchPane = 'all';
let somaLoaded = false;
let sxmLoggedIn = false;
let sxmUsername = '';
let sxmChannelsLoaded = false;
let currentPage = 1;
const PAGE_SIZE = 12;

// ── Toast ──
function showToast(msg, success = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (success ? ' success' : '');
  setTimeout(() => { t.className = 'toast'; }, 2200);
}

// ── API helpers ──
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  return r.json();
}

// ── Volume ──
function updateVolSlider(v) {
  volume = v;
  const slider = document.getElementById('volSlider');
  slider.value = v;
  slider.style.setProperty('--vol-pct', v + '%');
  document.getElementById('volNumber').textContent = v;
}

async function setVolume(v) {
  v = Math.max(0, Math.min(100, v));
  updateVolSlider(v);
  clearTimeout(volDebounce);
  volDebounce = setTimeout(async () => {
    await api('POST', '/volume', { volume: v });
  }, 80);
}

document.getElementById('volSlider').addEventListener('input', e => setVolume(+e.target.value));
document.getElementById('volDown').addEventListener('click', () => setVolume(volume - 5));
document.getElementById('volUp').addEventListener('click', () => setVolume(volume + 5));

document.getElementById('stopBtn').addEventListener('click', async () => {
  await api('POST', '/stop');
  currentStationId = null;
  updateTicker(null);
  renderGrid();
});

// ── Ticker ──
function updateTicker(station) {
  const ticker = document.getElementById('tickerText');
  const eq = document.getElementById('eqMini');
  if (station) {
    ticker.textContent = `${station.name}  —  ${station.slogan || station.genre}`;
    ticker.className = 'ticker-inner active';
    eq.className = 'eq-mini active';
  } else {
    ticker.textContent = 'Nothing playing';
    ticker.className = 'ticker-inner';
    eq.className = 'eq-mini';
  }
}

// ── Play / Stop ──
async function playStation(id) {
  if (currentStationId === id) {
    await api('POST', '/stop');
    currentStationId = null;
    updateTicker(null);
  } else {
    const res = await api('POST', '/play', { id });
    if (res.ok) {
      currentStationId = id;
      updateTicker(res.station);
    } else {
      showToast('Could not play station', false);
    }
  }
  renderGrid();
}

// ── City tabs ──
function renderCityTabs() {
  const bar = document.getElementById('cityBar');
  bar.querySelectorAll('.city-tab').forEach(t => t.remove());
  const addBtn = document.getElementById('addCityBtn');

  const allTab = document.createElement('div');
  allTab.className = 'city-tab' + (activeCity === 'All' ? ' active' : '');
  allTab.dataset.city = 'All';
  allTab.textContent = 'All';
  bar.insertBefore(allTab, addBtn);

  cities.forEach(city => {
    const tab = document.createElement('div');
    tab.className = 'city-tab' + (activeCity === city ? ' active' : '');
    tab.dataset.city = city;
    tab.textContent = city;
    bar.insertBefore(tab, addBtn);
  });

  bar.querySelectorAll('.city-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activeCity = tab.dataset.city;
      currentPage = 1;
      renderCityTabs();
      renderGrid();
    });
  });
}

// ── Pagination ──
function updatePagination(totalCount) {
  const totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
  const paginationEl = document.getElementById('pagination');
  const prevBtn = document.getElementById('prevPage');
  const nextBtn = document.getElementById('nextPage');
  const indicator = document.getElementById('pageIndicator');

  if (totalCount <= PAGE_SIZE) {
    paginationEl.style.display = 'none';
  } else {
    paginationEl.style.display = 'flex';
    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPages;
    indicator.textContent = `Page ${currentPage} of ${totalPages}`;
  }
}

// ── Station grid ──
function renderGrid() {
  const grid = document.getElementById('stationGrid');
  grid.innerHTML = '';

  const filtered = activeCity === 'All'
    ? stations
    : stations.filter(s => s.city === activeCity);

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><p>No stations for this city.<br>Use search below to add some.</p></div>';
    updatePagination(0);
    return;
  }

  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;

  const pageStations = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

  pageStations.forEach((station) => {
    const card = document.createElement('div');
    card.className = 'station-card' + (station.id === currentStationId ? ' playing' : '');
    card.style.setProperty('--card-color', station.color || '#555');
    card.draggable = true;
    card.dataset.id = station.id;
    card.dataset.index = stations.indexOf(station);

    const isSxm = station.source === 'siriusxm';

    card.innerHTML = `
      <div class="card-top">
        <div class="card-top-left">
          <span class="genre-badge">${station.genre || 'Radio'}</span>
          ${isSxm ? '<span class="sxm-badge">SXM</span>' : ''}
        </div>
        <div class="eq-bars">
          <span style="height:8px"></span>
          <span style="height:14px"></span>
          <span style="height:6px"></span>
          <span style="height:11px"></span>
          <span style="height:9px"></span>
        </div>
      </div>
      <div class="card-name">${station.name}</div>
      <div class="card-slogan">${station.slogan || ''}</div>
      <div class="card-footer">
        <button class="play-btn" title="${station.id === currentStationId ? 'Stop' : 'Play'}">
          ${station.id === currentStationId
            ? `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`
            : `<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`
          }
        </button>
      </div>
    `;

    card.querySelector('.play-btn').addEventListener('click', e => {
      e.stopPropagation();
      playStation(station.id);
    });
    card.addEventListener('click', () => playStation(station.id));

    // Drag and drop
    card.addEventListener('dragstart', e => {
      dragSrcIndex = +card.dataset.index;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', async e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      const destIndex = +card.dataset.index;
      if (dragSrcIndex !== null && dragSrcIndex !== destIndex) {
        const moved = stations.splice(dragSrcIndex, 1)[0];
        stations.splice(destIndex, 0, moved);
        await api('POST', '/stations', stations);
        renderGrid();
      }
    });

    grid.appendChild(card);
  });

  updatePagination(filtered.length);
}

document.getElementById('prevPage').addEventListener('click', () => { currentPage--; renderGrid(); });
document.getElementById('nextPage').addEventListener('click', () => { currentPage++; renderGrid(); });

// ── Add city modal ──
document.getElementById('addCityBtn').addEventListener('click', () => {
  document.getElementById('cityInput').value = '';
  document.getElementById('cityModal').classList.add('open');
  setTimeout(() => document.getElementById('cityInput').focus(), 50);
});
document.getElementById('cityCancelBtn').addEventListener('click', () => {
  document.getElementById('cityModal').classList.remove('open');
});
document.getElementById('citySaveBtn').addEventListener('click', async () => {
  const val = document.getElementById('cityInput').value.trim();
  if (!val) return;
  if (!cities.includes(val)) {
    cities.push(val);
    await api('POST', '/cities', cities);
    renderCityTabs();
    showToast(`Added city: ${val}`);
  }
  document.getElementById('cityModal').classList.remove('open');
});
document.getElementById('cityInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('citySaveBtn').click();
  if (e.key === 'Escape') document.getElementById('cityCancelBtn').click();
});

// ── Search tab switching ──
document.querySelectorAll('.search-tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const pane = btn.dataset.pane;
    document.querySelectorAll('.search-tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.search-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('pane-' + pane).classList.add('active');
    activeSearchPane = pane;

    // Auto-load SomaFM on first open
    if (pane === 'somafm' && !somaLoaded) {
      loadSomaFM();
    }
    // Load SXM channels if already logged in
    if (pane === 'siriusxm') {
      refreshSxmPane();
    }
  });
});

// ── Play SXM station directly by URL (not in stations.json) ──
async function playSxmStation(station) {
  if (currentStationId === station.id) {
    await api('POST', '/stop');
    currentStationId = null;
    updateTicker(null);
  } else {
    const res = await api('POST', '/play', {
      id: station.id,
      url: station.url,
      name: station.name,
      genre: station.genre,
      color: station.color,
      source: station.source,
      slogan: station.slogan,
      city: station.city,
    });
    if (res.ok) {
      currentStationId = station.id;
      updateTicker(res.station);
      showToast(`▶ ${station.name}`);
    } else {
      showToast('Could not play station', false);
    }
  }
}

// ── Result card builder ──
function buildResultCard(station, container) {
  const card = document.createElement('div');
  card.className = 'result-card' + (station.source === 'siriusxm' ? ' sxm-card' : '');
  const alreadySaved = stations.some(s => s.id === station.id || s.url === station.url);
  const isSxm = station.source === 'siriusxm';
  const isPlaying = currentStationId === station.id;
  card.innerHTML = `
    <div class="result-info">
      <div class="result-name">${station.name}${isSxm ? ' <span class="sxm-badge">SXM</span>' : ''}</div>
      <div class="result-meta">${[station.genre, station.city].filter(Boolean).join(' · ')}</div>
    </div>
    <div style="display:flex;gap:6px;align-items:center">
      ${isSxm ? `<button class="play-btn sxm-play-btn" title="${isPlaying ? 'Stop' : 'Play'}" style="width:32px;height:32px;border-radius:50%;border:none;background:var(--sxm-blue);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        ${isPlaying
          ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`
          : `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`
        }
      </button>` : ''}
      <button class="add-btn" ${alreadySaved ? 'disabled' : ''}>${alreadySaved ? 'Saved' : '+ Add'}</button>
    </div>
  `;
  if (isSxm) {
    card.querySelector('.sxm-play-btn').addEventListener('click', async function(e) {
      e.stopPropagation();
      await playSxmStation(station);
      // Refresh all result cards in this container to update play state
      container.querySelectorAll('.sxm-play-btn').forEach(btn => {
        const cardEl = btn.closest('.result-card');
        // update icon based on currentStationId
      });
      buildResultCard; // trigger re-render by rebuilding — simpler: just update the icon
      const svg = currentStationId === station.id
        ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`
        : `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
      this.innerHTML = svg;
      this.title = currentStationId === station.id ? 'Stop' : 'Play';
    });
  }
  card.querySelector('.add-btn').addEventListener('click', async function() {
    stations.push(station);
    await api('POST', '/stations', stations);
    this.textContent = 'Saved';
    this.disabled = true;
    renderGrid();
    showToast(`Added ${station.name}`);
  });
  container.appendChild(card);
}

// ── All-source search ──
document.getElementById('searchBtn').addEventListener('click', doSearch);
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  const city = document.getElementById('searchCity').value.trim();
  if (!q && !city) return;

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = 'Searching…';
  const container = document.getElementById('searchResults');
  container.innerHTML = '';

  try {
    const params = new URLSearchParams({ source: 'all' });
    if (q) params.set('q', q);
    if (city) params.set('city', city);
    const results = await fetch('/api/search?' + params).then(r => r.json());

    if (!Array.isArray(results) || results.length === 0) {
      container.innerHTML = '<div style="color:var(--text-muted);font-size:13px;grid-column:1/-1;padding:10px 0">No results found.</div>';
      return;
    }
    results.forEach(s => buildResultCard(s, container));
  } catch(e) {
    container.innerHTML = '<div style="color:#c0392b;font-size:13px;grid-column:1/-1;padding:10px 0">Search failed. Check your connection.</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search';
  }
}

// ── Radio Browser pane search ──
document.getElementById('rbSearchBtn').addEventListener('click', doRbSearch);
document.getElementById('rbSearchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doRbSearch();
});

async function doRbSearch() {
  const q = document.getElementById('rbSearchInput').value.trim();
  const city = document.getElementById('rbSearchCity').value.trim();
  if (!q && !city) return;

  const btn = document.getElementById('rbSearchBtn');
  btn.disabled = true;
  btn.textContent = 'Searching…';
  const container = document.getElementById('rbSearchResults');
  container.innerHTML = '';

  try {
    const params = new URLSearchParams({ source: 'radiobrowser' });
    if (q) params.set('q', q);
    if (city) params.set('city', city);
    const results = await fetch('/api/search?' + params).then(r => r.json());

    if (!Array.isArray(results) || results.length === 0) {
      container.innerHTML = '<div style="color:var(--text-muted);font-size:13px;grid-column:1/-1;padding:10px 0">No results found.</div>';
      return;
    }
    results.forEach(s => buildResultCard(s, container));
  } catch(e) {
    container.innerHTML = '<div style="color:#c0392b;font-size:13px;grid-column:1/-1;padding:10px 0">Search failed. Check your connection.</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search';
  }
}

// ── SomaFM pane ──
async function loadSomaFM() {
  somaLoaded = true;
  const container = document.getElementById('somaResults');
  container.innerHTML = '<div style="color:var(--text-muted);font-size:13px;grid-column:1/-1;padding:10px 0">Loading SomaFM channels…</div>';
  try {
    const results = await fetch('/api/search/somafm').then(r => r.json());
    container.innerHTML = '';
    if (!Array.isArray(results) || results.length === 0) {
      container.innerHTML = '<div style="color:var(--text-muted);font-size:13px;grid-column:1/-1;padding:10px 0">No SomaFM channels found.</div>';
      return;
    }
    results.forEach(s => buildResultCard(s, container));
  } catch(e) {
    container.innerHTML = '<div style="color:#c0392b;font-size:13px;grid-column:1/-1;padding:10px 0">Failed to load SomaFM. Check your connection.</div>';
  }
}

// ── Radio Garden pane ──
document.getElementById('rgSearchBtn').addEventListener('click', doRgSearch);
document.getElementById('rgSearchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doRgSearch();
});

async function doRgSearch() {
  const q = document.getElementById('rgSearchInput').value.trim();
  if (!q) return;

  const btn = document.getElementById('rgSearchBtn');
  btn.disabled = true;
  btn.textContent = 'Searching…';
  const container = document.getElementById('rgSearchResults');
  container.innerHTML = '';

  try {
    const params = new URLSearchParams({ q });
    const results = await fetch('/api/search/radiogarden?' + params).then(r => r.json());

    if (!Array.isArray(results) || results.length === 0) {
      container.innerHTML = '<div style="color:var(--text-muted);font-size:13px;grid-column:1/-1;padding:10px 0">No results found.</div>';
      return;
    }
    results.forEach(s => buildResultCard(s, container));
  } catch(e) {
    container.innerHTML = '<div style="color:#c0392b;font-size:13px;grid-column:1/-1;padding:10px 0">Search failed. Check your connection.</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Search';
  }
}

// ── SiriusXM pane ──
async function refreshSxmPane() {
  try {
    const status = await fetch('/api/sxm/status').then(r => r.json());
    sxmLoggedIn = status.logged_in;
    sxmUsername = status.username || '';
  } catch(e) {
    sxmLoggedIn = false;
  }

  const loginSection = document.getElementById('sxmLoginSection');
  const channelSection = document.getElementById('sxmChannelSection');

  if (sxmLoggedIn) {
    loginSection.style.display = 'none';
    channelSection.style.display = 'block';
    document.getElementById('sxmUsernameDisplay').textContent = sxmUsername;
    if (!sxmChannelsLoaded) {
      loadSxmChannels();
    }
  } else {
    loginSection.style.display = 'block';
    channelSection.style.display = 'none';
    sxmChannelsLoaded = false;
  }
}

async function loadSxmChannels() {
  sxmChannelsLoaded = true;
  const container = document.getElementById('sxmChannelResults');
  container.innerHTML = '<div style="color:var(--text-muted);font-size:13px;grid-column:1/-1;padding:10px 0">Loading channels…</div>';
  try {
    const results = await fetch('/api/sxm/channels').then(r => r.json());
    container.innerHTML = '';
    if (results.error) {
      container.innerHTML = `<div style="color:#c0392b;font-size:13px;grid-column:1/-1;padding:10px 0">Error: ${results.error}</div>`;
      return;
    }
    if (!Array.isArray(results) || results.length === 0) {
      container.innerHTML = '<div style="color:var(--text-muted);font-size:13px;grid-column:1/-1;padding:10px 0">No channels available.</div>';
      return;
    }
    results.forEach(s => buildResultCard(s, container));
  } catch(e) {
    sxmChannelsLoaded = false;
    container.innerHTML = '<div style="color:#c0392b;font-size:13px;grid-column:1/-1;padding:10px 0">Failed to load channels.</div>';
  }
}

// SXM login
document.getElementById('sxmLoginBtn').addEventListener('click', async () => {
  const username = document.getElementById('sxmUsername').value.trim();
  const password = document.getElementById('sxmPassword').value.trim();
  const errEl = document.getElementById('sxmLoginError');
  const btn = document.getElementById('sxmLoginBtn');
  const label = document.getElementById('sxmLoginLabel');

  errEl.className = 'sxm-error';

  if (!username || !password) {
    errEl.textContent = 'Please enter your username and password.';
    errEl.className = 'sxm-error show';
    return;
  }

  btn.disabled = true;
  label.textContent = 'Signing in…';
  btn.innerHTML = '<div class="spinner"></div><span>Signing in…</span>';

  try {
    const res = await fetch('/api/sxm/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    }).then(r => r.json());

    if (res.ok) {
      sxmChannelsLoaded = false;
      await refreshSxmPane();
      showToast('Signed in to SiriusXM');
    } else {
      errEl.textContent = res.error || 'Login failed. Check your credentials.';
      errEl.className = 'sxm-error show';
    }
  } catch(e) {
    errEl.textContent = 'Connection error. Please try again.';
    errEl.className = 'sxm-error show';
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span id="sxmLoginLabel">Sign In</span>';
  }
});

document.getElementById('sxmPassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('sxmLoginBtn').click();
});

// SXM logout
document.getElementById('sxmLogoutBtn').addEventListener('click', async () => {
  try {
    await fetch('/api/sxm/logout', { method: 'POST' });
    sxmLoggedIn = false;
    sxmChannelsLoaded = false;
    document.getElementById('sxmChannelResults').innerHTML = '';
    await refreshSxmPane();
    showToast('Signed out of SiriusXM');
  } catch(e) {
    showToast('Logout failed', false);
  }
});

// ── Status polling ──
async function pollStatus() {
  try {
    const s = await api('GET', '/status');
    if (s.station) {
      currentStationId = s.station.id;
      updateTicker(s.station);
    } else {
      currentStationId = null;
      updateTicker(null);
    }
    if (s.volume !== undefined && s.volume !== volume) {
      updateVolSlider(s.volume);
    }
  } catch(e) { /* ignore */ }
}

// ── Init ──
async function init() {
  try {
    [stations, cities] = await Promise.all([
      api('GET', '/stations'),
      api('GET', '/cities'),
    ]);
  } catch(e) {
    showToast('Could not load stations', false);
  }
  renderCityTabs();
  renderGrid();
  await pollStatus();
  setInterval(pollStatus, 3000);
}

init();
</script>
