<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oasis Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060608;
      --surface: rgba(14,14,18,0.85);
      --surface-solid: #0e0e12;
      --surface2: rgba(22,22,28,0.9);
      --surface3: #1c1c24;
      --orange: #e8420a;
      --orange-glow: rgba(232,66,10,0.35);
      --orange-dim: rgba(232,66,10,0.12);
      --orange-soft: rgba(232,66,10,0.06);
      --sxm-blue: #2a2ad4;
      --sxm-blue-dim: rgba(42,42,212,0.12);
      --sxm-glow: rgba(42,42,212,0.3);
      --text: #f0ede8;
      --text-muted: #6b6b78;
      --text-dim: #44444f;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --radius: 12px;
      --radius-lg: 16px;
      --glass: blur(20px) saturate(1.4);
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,66,10,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(42,42,212,0.03) 0%, transparent 50%);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding-bottom: 80px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 3px;
      color: var(--orange);
      white-space: nowrap;
      flex-shrink: 0;
      text-shadow: 0 0 30px var(--orange-glow);
    }
    .logo span {
      color: var(--text);
      text-shadow: none;
    }

    .now-playing-ticker {
      flex: 1;
      overflow: hidden;
      height: 28px;
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 10px;
    }

    .ticker-inner {
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.3px;
      transition: color 0.4s;
    }

    .ticker-inner.active {
      color: var(--orange);
      text-shadow: 0 0 20px var(--orange-glow);
      animation: ticker-scroll 18s linear infinite;
    }

    @keyframes ticker-scroll {
      0%   { transform: translateX(0); }
      40%  { transform: translateX(0); }
      60%  { transform: translateX(calc(-100% + 300px)); }
      100% { transform: translateX(0); }
    }

    .eq-mini {
      display: none;
      gap: 2px;
      align-items: flex-end;
      height: 16px;
      flex-shrink: 0;
    }
    .eq-mini.active { display: flex; }
    .eq-mini span {
      width: 3px;
      background: var(--orange);
      border-radius: 2px;
      animation: eqb 0.7s ease-in-out infinite alternate;
      box-shadow: 0 0 6px var(--orange-glow);
    }
    .eq-mini span:nth-child(2) { animation-delay: 0.15s; }
    .eq-mini span:nth-child(3) { animation-delay: 0.3s; }
    .eq-mini span:nth-child(4) { animation-delay: 0.1s; }

    @keyframes eqb {
      from { height: 3px; }
      to   { height: 14px; }
    }

    .header-btns {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .btn-pill:hover {
      border-color: var(--orange);
      color: var(--text);
      background: var(--orange-dim);
      box-shadow: 0 0 20px rgba(232,66,10,0.1);
    }
    .btn-pill svg { width: 14px; height: 14px; }

    /* ── City Tabs ── */
    .city-bar {
      background: var(--surface);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .city-bar::-webkit-scrollbar { display: none; }

    .city-tab {
      padding: 12px 18px;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.25s ease;
      user-select: none;
      position: relative;
    }
    .city-tab:hover { color: var(--text); }
    .city-tab.active {
      color: var(--orange);
      border-bottom-color: var(--orange);
    }
    .city-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      height: 12px;
      background: linear-gradient(to top, var(--orange-dim), transparent);
      pointer-events: none;
    }

    .city-tab-add {
      padding: 12px 14px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      transition: all 0.25s ease;
      border-radius: 6px;
    }
    .city-tab-add:hover {
      color: var(--orange);
      background: var(--orange-dim);
    }

    /* ── Main content ── */
    main {
      flex: 1;
      padding: 28px 24px;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Station grid ── */
    .station-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .station-card {
      background: linear-gradient(135deg, rgba(18,18,24,0.95), rgba(14,14,18,0.95));
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-left: 4px solid var(--card-color, #444);
      user-select: none;
      animation: cardIn 0.4s ease both;
    }
    .station-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 80% 20%, rgba(255,255,255,0.02), transparent 60%);
      pointer-events: none;
    }
    .station-card:hover {
      border-color: var(--card-color, var(--orange));
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px var(--border-hover);
    }
    .station-card.playing {
      background: linear-gradient(135deg, rgba(232,66,10,0.12), rgba(232,66,10,0.04));
      border-color: var(--orange);
      border-left-color: var(--orange);
      box-shadow: 0 0 40px rgba(232,66,10,0.15), 0 0 80px rgba(232,66,10,0.05);
      animation: playingPulse 3s ease-in-out infinite;
    }
    .station-card.dragging { opacity: 0.4; }
    .station-card.drag-over {
      border-color: var(--orange);
      background: var(--orange-soft);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes playingPulse {
      0%, 100% { box-shadow: 0 0 40px rgba(232,66,10,0.15), 0 0 80px rgba(232,66,10,0.05); }
      50% { box-shadow: 0 0 50px rgba(232,66,10,0.25), 0 0 100px rgba(232,66,10,0.08); }
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .card-top-left {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .genre-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      background: rgba(255,255,255,0.04);
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .station-card.playing .genre-badge {
      background: rgba(232,66,10,0.15);
      border-color: rgba(232,66,10,0.2);
      color: var(--orange);
    }

    .sxm-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(135deg, var(--sxm-blue), #3838e0);
      padding: 3px 7px;
      border-radius: 5px;
      box-shadow: 0 2px 8px var(--sxm-glow);
    }

    .eq-bars {
      display: none;
      gap: 2px;
      align-items: flex-end;
      height: 18px;
    }
    .station-card.playing .eq-bars { display: flex; }
    .eq-bars span {
      width: 3px;
      background: var(--orange);
      border-radius: 2px;
      animation: eqb 0.7s ease-in-out infinite alternate;
      box-shadow: 0 0 6px var(--orange-glow);
    }
    .eq-bars span:nth-child(2) { animation-delay: 0.2s; }
    .eq-bars span:nth-child(3) { animation-delay: 0.4s; }
    .eq-bars span:nth-child(4) { animation-delay: 0.1s; }
    .eq-bars span:nth-child(5) { animation-delay: 0.35s; }

    .card-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 23px;
      letter-spacing: 1.2px;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 4px;
    }

    .card-slogan {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
      min-height: 16px;
      line-height: 1.4;
    }

    .card-footer {
      display: flex;
      justify-content: flex-end;
    }

    .play-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
      flex-shrink: 0;
    }
    .play-btn:hover {
      background: var(--orange);
      transform: scale(1.12);
      box-shadow: 0 4px 20px var(--orange-glow);
    }
    .station-card.playing .play-btn {
      background: var(--orange);
      box-shadow: 0 4px 20px var(--orange-glow);
    }
    .play-btn svg { width: 14px; height: 14px; }

    /* ── Search section ── */
    .search-section {
      margin-bottom: 30px;
    }

    .search-section h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* ── Search source tabs ── */
    .search-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .search-tab-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
    }
    .search-tab-btn:hover {
      border-color: rgba(255,255,255,0.15);
      color: var(--text);
      background: rgba(255,255,255,0.04);
    }
    .search-tab-btn.active {
      border-color: var(--orange);
      background: var(--orange-dim);
      color: var(--orange);
      box-shadow: 0 0 16px rgba(232,66,10,0.1);
    }
    .search-tab-btn.sxm-tab.active {
      border-color: var(--sxm-blue);
      background: var(--sxm-blue-dim);
      color: #7799ff;
      box-shadow: 0 0 16px rgba(42,42,212,0.1);
    }

    /* ── Search panes ── */
    .search-pane { display: none; }
    .search-pane.active { display: block; }

    .search-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 180px;
      background: rgba(14,14,18,0.8);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all 0.25s ease;
    }
    .search-input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(232,66,10,0.1), 0 0 20px rgba(232,66,10,0.05);
    }
    .search-input::placeholder { color: var(--text-dim); }

    .search-btn {
      padding: 10px 22px;
      background: linear-gradient(135deg, var(--orange), #c23508);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 16px rgba(232,66,10,0.2);
    }
    .search-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(232,66,10,0.3);
    }
    .search-btn:active { transform: translateY(0); }
    .search-btn:disabled { background: var(--surface3); color: var(--text-dim); cursor: default; box-shadow: none; }

    .search-results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .result-card {
      background: rgba(14,14,18,0.7);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      transition: all 0.25s ease;
    }
    .result-card:hover {
      border-color: var(--border-hover);
      background: rgba(22,22,28,0.8);
    }
    .result-card.sxm-card {
      border-left: 3px solid var(--sxm-blue);
    }

    .result-info { min-width: 0; flex: 1; }
    .result-name {
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .result-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

    .add-btn {
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--orange);
      border-radius: 8px;
      color: var(--orange);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.25s ease;
    }
    .add-btn:hover {
      background: var(--orange);
      color: #fff;
      box-shadow: 0 4px 16px rgba(232,66,10,0.2);
    }
    .add-btn:disabled { border-color: var(--text-dim); color: var(--text-dim); cursor: default; box-shadow: none; }

    /* ── SiriusXM pane ── */
    .sxm-login-card {
      background: linear-gradient(135deg, rgba(18,18,24,0.95), rgba(14,14,18,0.95));
      border: 1px solid rgba(42,42,212,0.3);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      max-width: 380px;
      box-shadow: 0 8px 40px rgba(42,42,212,0.08);
    }

    .sxm-login-card h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 2px;
      color: #7799ff;
      margin-bottom: 6px;
      text-shadow: 0 0 20px var(--sxm-glow);
    }

    .sxm-login-card p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .sxm-input {
      width: 100%;
      background: rgba(10,10,14,0.6);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
      transition: all 0.25s ease;
    }
    .sxm-input:focus {
      border-color: var(--sxm-blue);
      box-shadow: 0 0 0 3px rgba(42,42,212,0.1);
    }
    .sxm-input::placeholder { color: var(--text-dim); }

    .sxm-login-btn {
      width: 100%;
      padding: 12px 0;
      background: linear-gradient(135deg, var(--sxm-blue), #3838e0);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 20px var(--sxm-glow);
    }
    .sxm-login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(42,42,212,0.4);
    }
    .sxm-login-btn:disabled { opacity: 0.5; cursor: default; transform: none; box-shadow: none; }

    .sxm-error {
      color: #e04040;
      font-size: 12px;
      margin-top: 12px;
      display: none;
    }
    .sxm-error.show { display: block; }

    .sxm-logged-in-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .sxm-user-info {
      font-size: 13px;
      color: var(--text-muted);
    }
    .sxm-user-info strong { color: #7799ff; }

    .sxm-logout-btn {
      padding: 7px 18px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .sxm-logout-btn:hover { border-color: #e04040; color: #e04040; }

    /* ── Spinner ── */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Volume bar (fixed bottom) ── */
    .volume-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 68px;
      background: var(--surface);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 14px;
      z-index: 200;
    }

    .vol-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      width: 56px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .vol-icon { color: var(--text-muted); flex-shrink: 0; }

    .vol-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }
    .vol-btn:hover {
      border-color: var(--orange);
      background: var(--orange-dim);
      box-shadow: 0 0 12px rgba(232,66,10,0.1);
    }

    .vol-slider-wrap {
      flex: 1;
      position: relative;
      height: 4px;
      max-width: 400px;
    }

    input[type=range].vol-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, var(--orange) 0%, var(--orange) var(--vol-pct), rgba(255,255,255,0.06) var(--vol-pct), rgba(255,255,255,0.06) 100%);
      outline: none;
      cursor: pointer;
    }
    input[type=range].vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--orange);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 10px var(--orange-glow);
    }
    input[type=range].vol-slider::-webkit-slider-thumb:hover {
      transform: scale(1.3);
      box-shadow: 0 0 20px var(--orange-glow);
    }
    input[type=range].vol-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--orange);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px var(--orange-glow);
    }

    .vol-number {
      width: 38px;
      text-align: right;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .vol-stop-btn {
      padding: 7px 18px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.25s ease;
    }
    .vol-stop-btn:hover {
      border-color: #e04040;
      color: #e04040;
      background: rgba(224,64,64,0.06);
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 28px;
      width: 380px;
      max-width: 90vw;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      animation: modalIn 0.3s ease;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1.5px;
      margin-bottom: 18px;
    }
    .modal input {
      width: 100%;
      background: rgba(10,10,14,0.6);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      margin-bottom: 18px;
      transition: border-color 0.25s;
    }
    .modal input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(232,66,10,0.1); }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
    .modal-btns button {
      padding: 9px 20px;
      border-radius: 10px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .modal-cancel {
      background: rgba(255,255,255,0.04);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .modal-cancel:hover { border-color: var(--border-hover); color: var(--text); }
    .modal-save {
      background: linear-gradient(135deg, var(--orange), #c23508);
      color: #fff;
      box-shadow: 0 4px 16px rgba(232,66,10,0.2);
    }
    .modal-save:hover { box-shadow: 0 6px 24px rgba(232,66,10,0.3); }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 84px;
      right: 24px;
      background: var(--surface-solid);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      opacity: 0;
      transform: translateY(8px) scale(0.96);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 300;
      pointer-events: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .toast.show { opacity: 1; transform: translateY(0) scale(1); }
    .toast.success { border-color: var(--orange); box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px rgba(232,66,10,0.1); }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin: 8px 0 32px;
    }
    .page-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
    }
    .page-btn:hover:not(:disabled) {
      border-color: var(--orange);
      background: var(--orange-dim);
      box-shadow: 0 0 12px rgba(232,66,10,0.1);
    }
    .page-btn:disabled { opacity: 0.2; cursor: default; }
    .page-indicator { font-size: 13px; color: var(--text-dim); min-width: 80px; text-align: center; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }
    .empty-state p {
      font-size: 15px;
      margin-top: 8px;
      line-height: 1.6;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .logo { font-size: 22px; }
      .header-btns .btn-pill span { display: none; }
      .vol-label { display: none; }
      main { padding: 18px 14px; }
      .station-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
      .station-card { padding: 14px; }
      .card-name { font-size: 19px; }
      .search-results { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">Oasis<span> Radio</span></div>

  <div class="now-playing-ticker">
    <div class="eq-mini" id="eqMini">
      <span style="height:8px"></span>
      <span style="height:12px"></span>
      <span style="height:5px"></span>

      <span>Deck</span>
    </a>
    <a class="btn-pill" href="http://192.168.2.89:32500" target="_blank">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>

<!-- City tabs -->
<div class="city-bar" id="cityBar">

  <div class="city-tab-add" id="addCityBtn" title="Add city">+</div>
</div>

<!-- Main -->
<main>
  <!-- Station grid -->

  <!-- Pagination -->
  <div class="pagination" id="pagination">

  <!-- Search -->
  <div class="search-section">

    <!-- Source tabs -->
    <div class="search-tabs">

      <button class="search-tab-btn" data-pane="radiobrowser">Radio Browser</button>

    <!-- All sources pane (htmx) -->
    <div class="search-pane active" id="pane-all">
      <form class="search-row" hx-get="/partials/search" hx-target="#searchResults" hx-swap="innerHTML"

        <input class="search-input" name="q" id="searchInput" type="text" placeholder="Search station name..." />

    <div class="search-pane" id="pane-radiobrowser">
      <form class="search-row" hx-get="/partials/search" hx-target="#rbSearchResults" hx-swap="innerHTML">
        <input type="hidden" name="source" value="radiobrowser" />
        <input class="search-input" name="q" id="rbSearchInput" type="text" placeholder="Search station name..." />
        <input class="search-input" name="city" id="rbSearchCity" type="text" placeholder="City / state (optional)" style="max-width:180px" />
        <button class="search-btn" type="submit" id="rbSearchBtn">Search</button>
      </form>
      <div class="search-results" id="rbSearchResults"></div>
    </div>

    <!-- SomaFM pane (htmx) -->
    <div class="search-pane" id="pane-somafm">
      <div style="margin-bottom:12px;font-size:13px;color:var(--text-muted)">Curated internet radio channels from SomaFM</div>
      <div class="search-results" id="somaResults"
           hx-get="/partials/somafm"
           hx-trigger="intersect once"
           hx-indicator="#somaSpinner">
        <div id="somaSpinner" style="color:var(--text-dim);font-size:13px;grid-column:1/-1;padding:10px 0">Loading SomaFM channels...</div>
      </div>

    <!-- Radio Garden pane (htmx) -->
    <div class="search-pane" id="pane-radiogarden">
      <form class="search-row" hx-get="/partials/search" hx-target="#rgSearchResults" hx-swap="innerHTML">
        <input type="hidden" name="source" value="radiogarden" />
        <input class="search-input" name="q" id="rgSearchInput" type="text" placeholder="Search Radio Garden..." />
        <button class="search-btn" type="submit" id="rgSearchBtn">Search</button>
      </form>
      <div class="search-results" id="rgSearchResults"></div>

    <!-- SiriusXM pane -->
    <div class="search-pane" id="pane-siriusxm">

          <input class="sxm-input" id="sxmPassword" type="password" placeholder="Password" autocomplete="current-password" />

          <button class="sxm-logout-btn" id="sxmLogoutBtn">Sign Out</button>

</main>

<!-- Volume bar -->
<div class="volume-bar">
  <div class="vol-label">Volume</div>
  <svg class="vol-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
    <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
  </svg>
  <button class="vol-btn" id="volDown">&minus;</button>
  <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80" style="--vol-pct:80%" />
  <button class="vol-btn" id="volUp">+</button>
  <span class="vol-number" id="volNumber">80</span>
  <button class="vol-stop-btn" id="stopBtn">&#9646; Stop</button>
</div>

<!-- Add city modal -->
<div class="modal-overlay" id="cityModal">
  <div class="modal">
    <h3>Add City</h3>
    <input type="text" id="cityInput" placeholder="e.g. Memphis" />
    <div class="modal-btns">
      <button class="modal-cancel" id="cityCancelBtn">Cancel</button>
      <button class="modal-save" id="citySaveBtn">Add</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──
let stations = [];
let cities = [];
let currentStationId = null;
let volume = 80;
let activeCity = 'All';
let dragSrcIndex = null;
let volDebounce = null;
let activeSearchPane = 'all';
let sxmLoggedIn = false;
let sxmUsername = '';
let sxmChannelsLoaded = false;
let currentPage = 1;
const PAGE_SIZE = 12;

// ── Toast ──
function showToast(msg, success = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (success ? ' success' : '');
  setTimeout(() => { t.className = 'toast'; }, 2200);
}

// ── API helpers ──
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  return r.json();
}

// ── Volume ──
function updateVolSlider(v) {
  volume = v;
  const slider = document.getElementById('volSlider');
  slider.value = v;
  slider.style.setProperty('--vol-pct', v + '%');
  document.getElementById('volNumber').textContent = v;
}

async function setVolume(v) {
  v = Math.max(0, Math.min(100, v));
  updateVolSlider(v);
  clearTimeout(volDebounce);
  volDebounce = setTimeout(async () => {
    await api('POST', '/volume', { volume: v });
  }, 80);
}

document.getElementById('volSlider').addEventListener('input', e => setVolume(+e.target.value));
document.getElementById('volDown').addEventListener('click', () => setVolume(volume - 5));
document.getElementById('volUp').addEventListener('click', () => setVolume(volume + 5));

document.getElementById('stopBtn').addEventListener('click', async () => {
  await api('POST', '/stop');
  currentStationId = null;
  updateTicker(null);
  renderGrid();
});

// ── Ticker ──
function updateTicker(station) {
  const ticker = document.getElementById('tickerText');
  const eq = document.getElementById('eqMini');
  if (station) {
    ticker.textContent = `${station.name}  —  ${station.slogan || station.genre}`;
    ticker.className = 'ticker-inner active';
    eq.className = 'eq-mini active';
  } else {
    ticker.textContent = 'Nothing playing';
    ticker.className = 'ticker-inner';
    eq.className = 'eq-mini';
  }
}

// ── Play / Stop ──
async function playStation(id) {
  if (currentStationId === id) {
    await api('POST', '/stop');
    currentStationId = null;
    updateTicker(null);
  } else {
    const res = await api('POST', '/play', { id });
    if (res.ok) {
      currentStationId = id;
      updateTicker(res.station);
    } else {
      showToast('Could not play station', false);
    }
  }
  renderGrid();
}

// ── City tabs ──
function renderCityTabs() {
  const bar = document.getElementById('cityBar');
  bar.querySelectorAll('.city-tab').forEach(t => t.remove());
  const addBtn = document.getElementById('addCityBtn');

  const allTab = document.createElement('div');
  allTab.className = 'city-tab' + (activeCity === 'All' ? ' active' : '');
  allTab.dataset.city = 'All';
  allTab.textContent = 'All';
  bar.insertBefore(allTab, addBtn);

  cities.forEach(city => {
    const tab = document.createElement('div');
    tab.className = 'city-tab' + (activeCity === city ? ' active' : '');
    tab.dataset.city = city;
    tab.textContent = city;
    bar.insertBefore(tab, addBtn);
  });

  bar.querySelectorAll('.city-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activeCity = tab.dataset.city;
      currentPage = 1;
      renderCityTabs();
      renderGrid();
    });
  });
}

// ── Pagination ──
function updatePagination(totalCount) {
  const totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));
  const paginationEl = document.getElementById('pagination');
  const prevBtn = document.getElementById('prevPage');
  const nextBtn = document.getElementById('nextPage');
  const indicator = document.getElementById('pageIndicator');

  if (totalCount <= PAGE_SIZE) {
    paginationEl.style.display = 'none';
  } else {
    paginationEl.style.display = 'flex';
    prevBtn.disabled = currentPage <= 1;
    nextBtn.disabled = currentPage >= totalPages;
    indicator.textContent = `Page ${currentPage} of ${totalPages}`;
  }
}

// ── Station grid ──
function renderGrid() {
  const grid = document.getElementById('stationGrid');
  grid.innerHTML = '';

  const filtered = activeCity === 'All'
    ? stations
    : stations.filter(s => s.city === activeCity);

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><p>No stations for this city.<br>Use search below to add some.</p></div>';
    updatePagination(0);
    return;
  }

  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;

  const pageStations = filtered.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);

  const pageOffset = (currentPage - 1) * PAGE_SIZE;
  pageStations.forEach((station, pageIdx) => {
    const absIndex = activeCity === 'All'
      ? pageOffset + pageIdx
      : stations.indexOf(station);
    const card = document.createElement('div');
    card.className = 'station-card' + (station.id === currentStationId ? ' playing' : '');
    card.style.setProperty('--card-color', station.color || '#555');
    card.style.animationDelay = (pageIdx * 0.04) + 's';
    card.draggable = true;
    card.dataset.id = station.id;
    card.dataset.index = absIndex;

    const isSxm = station.source === 'siriusxm';

    const cardTop = document.createElement('div');
    cardTop.className = 'card-top';
    const cardTopLeft = document.createElement('div');
    cardTopLeft.className = 'card-top-left';
    const genreBadge = document.createElement('span');
    genreBadge.className = 'genre-badge';
    genreBadge.textContent = station.genre || 'Radio';
    cardTopLeft.appendChild(genreBadge);
    if (isSxm) {
      const sxmBadge = document.createElement('span');
      sxmBadge.className = 'sxm-badge';
      sxmBadge.textContent = 'SXM';
      cardTopLeft.appendChild(sxmBadge);
    }
    cardTop.appendChild(cardTopLeft);
    cardTop.innerHTML += `<div class="eq-bars">
      <span style="height:8px"></span><span style="height:14px"></span>
      <span style="height:6px"></span><span style="height:11px"></span>
      <span style="height:9px"></span></div>`;
    card.appendChild(cardTop);

    const cardName = document.createElement('div');
    cardName.className = 'card-name';
    cardName.textContent = station.name;
    card.appendChild(cardName);

    const cardSlogan = document.createElement('div');
    cardSlogan.className = 'card-slogan';
    cardSlogan.textContent = station.slogan || '';
    card.appendChild(cardSlogan);

    const cardFooter = document.createElement('div');
    cardFooter.className = 'card-footer';
    const playBtn = document.createElement('button');
    playBtn.className = 'play-btn';
    playBtn.title = station.id === currentStationId ? 'Stop' : 'Play';
    playBtn.innerHTML = station.id === currentStationId
      ? `<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
    cardFooter.appendChild(playBtn);
    card.appendChild(cardFooter);

    playBtn.addEventListener('click', e => {
      e.stopPropagation();
      playStation(station.id);
    });
    card.addEventListener('click', () => playStation(station.id));

    // Drag and drop
    card.addEventListener('dragstart', e => {
      dragSrcIndex = +card.dataset.index;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      card.classList.add('drag-over');
    });
    card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
    card.addEventListener('drop', async e => {
      e.preventDefault();
      card.classList.remove('drag-over');
      const destIndex = +card.dataset.index;
      if (dragSrcIndex !== null && dragSrcIndex !== destIndex) {
        const moved = stations.splice(dragSrcIndex, 1)[0];
        stations.splice(destIndex, 0, moved);
        await api('POST', '/stations', stations);
        renderGrid();
      }
    });

    grid.appendChild(card);
  });

  updatePagination(filtered.length);
}

document.getElementById('prevPage').addEventListener('click', () => { currentPage--; renderGrid(); });
document.getElementById('nextPage').addEventListener('click', () => { currentPage++; renderGrid(); });

// ── Add city modal ──
document.getElementById('addCityBtn').addEventListener('click', () => {
  document.getElementById('cityInput').value = '';
  document.getElementById('cityModal').classList.add('open');
  setTimeout(() => document.getElementById('cityInput').focus(), 50);
});
document.getElementById('cityCancelBtn').addEventListener('click', () => {
  document.getElementById('cityModal').classList.remove('open');
});
document.getElementById('citySaveBtn').addEventListener('click', async () => {
  const val = document.getElementById('cityInput').value.trim();
  if (!val) return;
  if (!cities.includes(val)) {
    cities.push(val);
    await api('POST', '/cities', cities);
    renderCityTabs();
    showToast(`Added city: ${val}`);
  }
  document.getElementById('cityModal').classList.remove('open');
});
document.getElementById('cityInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('citySaveBtn').click();
  if (e.key === 'Escape') document.getElementById('cityCancelBtn').click();
});

// ── Search tab switching ──
document.querySelectorAll('.search-tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const pane = btn.dataset.pane;
    document.querySelectorAll('.search-tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.search-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('pane-' + pane).classList.add('active');
    activeSearchPane = pane;

    if (pane === 'siriusxm') {
      refreshSxmPane();
    }
  });
});

// ── Play SXM station directly by URL ──
async function playSxmStation(station) {
  if (currentStationId === station.id) {
    await api('POST', '/stop');
    currentStationId = null;
    updateTicker(null);
  } else {
    const res = await api('POST', '/play', {
      id: station.id,
      url: station.url,
      name: station.name,
      genre: station.genre,
      color: station.color,
      source: station.source,
      slogan: station.slogan,
      city: station.city,
    });
    if (res.ok) {
      currentStationId = station.id;
      updateTicker(res.station);
      showToast(`▶ ${station.name}`);
    } else {
      showToast('Could not play station', false);
    }
  }
}

// ── Result card builder ──
function buildResultCard(station, container) {
  const card = document.createElement('div');
  card.className = 'result-card' + (station.source === 'siriusxm' ? ' sxm-card' : '');
  const alreadySaved = stations.some(s => s.id === station.id || s.url === station.url);
  const isSxm = station.source === 'siriusxm';
  const isPlaying = currentStationId === station.id;

  const info = document.createElement('div');
  info.className = 'result-info';
  const nameEl = document.createElement('div');
  nameEl.className = 'result-name';
  nameEl.textContent = station.name;
  if (isSxm) {
    const badge = document.createElement('span');
    badge.className = 'sxm-badge';
    badge.textContent = 'SXM';
    badge.style.marginLeft = '6px';
    nameEl.appendChild(document.createTextNode(' '));
    nameEl.appendChild(badge);
  }
  const metaEl = document.createElement('div');
  metaEl.className = 'result-meta';
  metaEl.textContent = [station.genre, station.city].filter(Boolean).join(' · ');
  info.appendChild(nameEl);
  info.appendChild(metaEl);
  card.appendChild(info);

  const actions = document.createElement('div');
  actions.style.cssText = 'display:flex;gap:6px;align-items:center';

  if (isSxm) {
    const sxmPlayBtn = document.createElement('button');
    sxmPlayBtn.className = 'play-btn sxm-play-btn';
    sxmPlayBtn.title = isPlaying ? 'Stop' : 'Play';
    sxmPlayBtn.style.cssText = 'width:32px;height:32px;border-radius:50%;border:none;background:var(--sxm-blue);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 10px var(--sxm-glow)';
    sxmPlayBtn.innerHTML = isPlaying
      ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`
      : `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
    sxmPlayBtn.addEventListener('click', async function(e) {
      e.stopPropagation();
      await playSxmStation(station);
      const svg = currentStationId === station.id
        ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`
        : `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
      this.innerHTML = svg;
      this.title = currentStationId === station.id ? 'Stop' : 'Play';
    });
    actions.appendChild(sxmPlayBtn);
  }

  const addBtn = document.createElement('button');
  addBtn.className = 'add-btn';
  addBtn.textContent = alreadySaved ? 'Saved' : '+ Add';
  addBtn.disabled = alreadySaved;
  addBtn.addEventListener('click', async function() {
    stations.push(station);
    await api('POST', '/stations', stations);
    this.textContent = 'Saved';
    this.disabled = true;
    renderGrid();
    showToast(`Added ${station.name}`);
  });
  actions.appendChild(addBtn);
  card.appendChild(actions);
  container.appendChild(card);
}

// ── htmx: refresh station grid when a station is added via htmx ──
document.body.addEventListener('stationAdded', async () => {
  stations = await api('GET', '/stations');
  renderGrid();
  showToast('Station added');
});

// ── SiriusXM pane ──
async function refreshSxmPane() {
  try {
    const status = await fetch('/api/sxm/status').then(r => r.json());
    sxmLoggedIn = status.logged_in;
    sxmUsername = status.username || '';
  } catch(e) {
    sxmLoggedIn = false;
  }

  const loginSection = document.getElementById('sxmLoginSection');
  const channelSection = document.getElementById('sxmChannelSection');

  if (sxmLoggedIn) {
    loginSection.style.display = 'none';
    channelSection.style.display = 'block';
    document.getElementById('sxmUsernameDisplay').textContent = sxmUsername;
    if (!sxmChannelsLoaded) {
      loadSxmChannels();
    }
  } else {
    loginSection.style.display = 'block';
    channelSection.style.display = 'none';
    sxmChannelsLoaded = false;
  }
}

async function loadSxmChannels() {
  sxmChannelsLoaded = true;
  const container = document.getElementById('sxmChannelResults');
  container.innerHTML = '<div style="color:var(--text-dim);font-size:13px;grid-column:1/-1;padding:10px 0">Loading channels...</div>';
  try {
    const results = await fetch('/api/sxm/channels').then(r => r.json());
    container.innerHTML = '';
    if (results.error) {
      container.innerHTML = `<div style="color:#e04040;font-size:13px;grid-column:1/-1;padding:10px 0">Error: ${results.error}</div>`;
      return;
    }
    if (!Array.isArray(results) || results.length === 0) {
      container.innerHTML = '<div style="color:var(--text-dim);font-size:13px;grid-column:1/-1;padding:10px 0">No channels available.</div>';
      return;
    }
    results.forEach(s => buildResultCard(s, container));
  } catch(e) {
    sxmChannelsLoaded = false;
    container.innerHTML = '<div style="color:#e04040;font-size:13px;grid-column:1/-1;padding:10px 0">Failed to load channels.</div>';
  }
}

// SXM login
document.getElementById('sxmLoginBtn').addEventListener('click', async () => {
  const username = document.getElementById('sxmUsername').value.trim();
  const password = document.getElementById('sxmPassword').value.trim();
  const errEl = document.getElementById('sxmLoginError');
  const btn = document.getElementById('sxmLoginBtn');

  errEl.className = 'sxm-error';

  if (!username || !password) {
    errEl.textContent = 'Please enter your username and password.';
    errEl.className = 'sxm-error show';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div><span>Signing in…</span>';

  try {
    const res = await fetch('/api/sxm/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    }).then(r => r.json());

    if (res.ok) {
      sxmChannelsLoaded = false;
      await refreshSxmPane();
      showToast('Signed in to SiriusXM');
    } else {
      errEl.textContent = res.error || 'Login failed. Check your credentials.';
      errEl.className = 'sxm-error show';
    }
  } catch(e) {
    errEl.textContent = 'Connection error. Please try again.';
    errEl.className = 'sxm-error show';
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span id="sxmLoginLabel">Sign In</span>';
  }
});

document.getElementById('sxmPassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('sxmLoginBtn').click();
});

// SXM logout
document.getElementById('sxmLogoutBtn').addEventListener('click', async () => {
  try {
    await fetch('/api/sxm/logout', { method: 'POST' });
    sxmLoggedIn = false;
    sxmChannelsLoaded = false;
    document.getElementById('sxmChannelResults').innerHTML = '';
    await refreshSxmPane();
    showToast('Signed out of SiriusXM');
  } catch(e) {
    showToast('Logout failed', false);
  }
});

// ── Status polling ──
async function pollStatus() {
  try {
    const s = await api('GET', '/status');
    if (s.station) {
      currentStationId = s.station.id;
      updateTicker(s.station);
    } else {
      currentStationId = null;
      updateTicker(null);
    }
    if (s.volume !== undefined && s.volume !== volume) {
      updateVolSlider(s.volume);
    }
  } catch(e) { /* ignore */ }
}

// ── Init ──
async function init() {
  try {
    [stations, cities] = await Promise.all([
      api('GET', '/stations'),
      api('GET', '/cities'),
    ]);
  } catch(e) {
    showToast('Could not load stations', false);
  }
  renderCityTabs();
  renderGrid();
  await pollStatus();
  setInterval(pollStatus, 3000);
}

init();
</script>
</body>
</html>
