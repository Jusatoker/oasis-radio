version: '3.8'

services:
  oasis-radio:
    build: .
    container_name: oasis-radio
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./app/stations.json:/data/stations.json
      - ./app/cities.json:/data/cities.json
      - ./app/streamdeck_layout.json:/data/streamdeck_layout.json
      - ./app/siriusxm.json:/data/siriusxm.json
      # PulseAudio socket — host PA handles the USB audio device
      - /run/user/1000/pulse:/run/user/1000/pulse
      - ~/.config/pulse/cookie:/root/.config/pulse/cookie:ro
    environment:
      - AUDIO_OUTPUT=pulse
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
      - STATIONS_FILE=/data/stations.json
      - CITIES_FILE=/data/cities.json
      - LAYOUT_FILE=/data/streamdeck_layout.json
